<body>
    <h1>MANIPULANDO IMAGENS<mark> DO HTML ATRAVÉS DO JS</mark></h1>
    <hr>
    <input type="button" onclick="triste();" value="feliz">
    <input type="button" onclick="feliz();" value="triste">

    <div>
        <img src="" alt="feliz" title="feliz">
    </div>

    <script>
        function triste() {
            var tag_img = document.getElementsByName('img')[0]
            console.log(tag_img)
        }
        function feliz() {
            var tag_img = document.getElementsByTagName('img')[0]
            console.log(tag_img)
            tag_img.src = "";

        }

    </script>
</body>
