<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Esse é uma página modelo">

    <title>EXERCÍCIOS 01 DE JS</title>
</head>
<body>
    <h1>Integrando os recursos de interatividade do JS</h1>
    <hr>
    <script>
        window.confirm("Seja bem-vindo ao site");
        let nome = window.prompt("QUAL É O SEU NOME? ");
        console.log(nome);
        let resposta = window.confirm("Você deseja sair da página?")
        console.log(resposta);
        
        if(resposta==true){
            window.close()      
        }else{
            window.alert("Aproveite o meu site," +nome);
        }
    </script>


</body>
